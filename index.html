<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPI Perkebunan - SMK N 1 Gedung Aji</title>
    
    <!-- Pustaka Grafik Utama (Jika offline, grafik teks otomatis menggantikan) -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        /* --- DESAIN DASAR KHUSUS SMARTPHONE (MOBILE-FIRST) --- */ 
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f0f4f1; color: #2d3748; padding: 0; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        /* --- KARTU UTAMA & LOGIN --- */
        .app-container { max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; padding-bottom: 30px; }
        .login-card { padding: 40px 24px; text-align: center; background: #ffffff; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .logo-box { width: 90px; height: 90px; background: #e6f4ea; border-radius: 50%; display: flex; items-center: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.05); border: 2px solid #c2e7cc; line-height: 90px; }
        
        h1 { color: #1b4d3e; font-size: 22px; font-weight: 800; tracking: -0.5px; margin-bottom: 4px; text-transform: uppercase; }
        .subtitle { color: #718096; font-size: 13px; font-weight: 500; margin-bottom: 24px; }
        .school-badge { display: inline-block; background: #1b4d3e; color: #ffffff; font-size: 11px; font-weight: 700; padding: 6px 16px; border-radius: 20px; margin-bottom: 30px; letter-spacing: 1px; box-shadow: 0 2px 6px rgba(27,77,62,0.2); }
        
        /* --- FORM INPUT --- */
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: #4a5568; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-input { w-index: 100%; width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; rounded: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; outline: none; transition: all 0.2s; background: #f8fafc; }
        .form-input:focus { border-color: #1b4d3e; background: #ffffff; box-shadow: 0 0 0 3px rgba(27,77,62,0.1); }
        
        /* --- TOMBOL UTAMA --- */
        .btn-primary { width: 100%; background: #1b4d3e; color: #ffffff; border: none; padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(27,77,62,0.2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; }
        .btn-primary:active { transform: scale(0.98); background: #12352a; }
        
        /* --- NAVIGASI ATAS (HEADER) --- */
        .app-header { background: #1b4d3e; color: #ffffff; padding: 16px; display: flex; justify-content: space-between; items-center: center; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); }
        .user-info { display: flex; items-center: center; gap: 12px; }
        .user-avatar { font-size: 32px; background: rgba(255,255,255,0.15); padding: 6px; border-radius: 50%; width: 48px; height: 48px; text-align: center; line-height: 36px; }
        .user-text p { font-size: 11px; color: #a3e635; font-weight: 700; text-transform: uppercase; }
        .user-text h2 { font-size: 15px; font-weight: 700; }
        .btn-logout { background: #e53e3e; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        
        /* --- PANEL KONTROL SIMULASI --- */
        .main-content { padding: 16px; }
        .card { background: #ffffff; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #edf2f7; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .card-title { font-size: 12px; font-weight: 800; color: #4a5568; border-bottom: 1px solid #edf2f7; padding-bottom: 8px; margin-bottom: 12px; tracking: 0.5px; text-transform: uppercase; }
        
        /* FASE GRID BUTTONS */
        .fase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
        .btn-fase { padding: 12px; border: 2px solid #e2e8f0; background: #ffffff; border-radius: 10px; font-size: 11px; font-weight: 700; color: #4a5568; cursor: pointer; transition: all 0.2s; }
        .btn-fase.active { border-color: #1b4d3e; background: #e6f4ea; color: #1b4d3e; font-weight: 800; }
        
        /* RANGE SLIDER KUSTOM */
        .slider-container { margin-top: 10px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .range-slider { width: 100%; -webkit-appearance: none; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        .range-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #1b4d3e; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        
        /* PROGRESS VEGETATIF */
        .progress-box { text-align: center; padding: 10px 0; }
        .plant-icon { font-size: 55px; margin-bottom: 8px; transition: transform 0.3s; }
        .progress-bar-bg { width: 100%; height: 8px; background: #edf2f7; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        .progress-bar-fill { height: 100%; background: #ecc94b; width: 35%; transition: all 0.5s ease-in-out; }
        .status-text { font-size: 12px; font-weight: 700; color: #dd6b20; }
        .jarak-tanam-badge { display: inline-block; background: #f7fafc; border: 1px solid #e2e8f0; padding: 4px 12px; border-radius: 20px; font-size: 11px; color: #4a5568; font-weight: 600; margin-top: 8px; }
        
        /* --- TAB ANDROID NAVIGATION --- */
        .tab-bar { display: flex; border-bottom: 2px solid #edf2f7; background: #f7fafc; border-top-left-radius: 12px; border-top-right-radius: 12px; }
        .tab-btn { flex: 1; padding: 14px 0; border: none; background: none; font-size: 12px; font-weight: 700; color: #a0aec0; cursor: pointer; text-align: center; }
        .tab-btn.active { color: #1b4d3e; border-bottom: 3px solid #1b4d3e; font-weight: 800; }
        .tab-body { padding: 16px; background: #ffffff; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        .hidden { display: none !important; }
        
        /* --- KOMPONEN DAFTAR HASIL (LIST) --- */
        .info-card { background: #ebf8ff; border: 1px solid #bee3f8; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        .info-card-title { font-size: 10px; font-weight: 700; color: #2b6cb0; text-transform: uppercase; }
        .info-card-val { font-size: 15px; font-weight: 800; color: #2c5282; margin-top: 2px; }
        
        .list-item { display: flex; justify-content: space-between; items-center: center; padding: 12px; background: #f7fafc; border: 1px solid #edf2f7; border-radius: 10px; margin-bottom: 8px; }
        .list-item-title { font-size: 13px; font-weight: 700; color: #2d3748; }
        .list-item-sub { font-size: 10px; color: #718096; font-weight: 500; margin-top: 1px; }
        .list-item-qty { font-size: 14px; font-weight: 800; color: #2f855a; background: #e6f4ea; padding: 4px 10px; border-radius: 6px; }
        
        .pest-box { border-left: 4px solid #3182ce; background: #f7fafc; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-top: 1px solid #edf2f7; border-right: 1px solid #edf2f7; border-bottom: 1px solid #edf2f7; }
        
        /* SCANNER STYLE */
        .scan-zone { border: 2px dashed #cbd5e0; padding: 24px; border-radius: 12px; background: #f7fafc; cursor: pointer; position: relative; margin-bottom: 12px; }
        .scan-zone:active { background: #edf2f7; }
        .scan-loader { position: absolute; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; items-center: center; justify-content: center; font-size: 12px; font-weight: 700; color: #1b4d3e; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #1b4d3e; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .report-box { background: #f0fff4; border: 1px solid #c6f6d5; padding: 14px; border-radius: 12px; margin-top: 10px; text-align: left; }
        
        .footer-text { text-align: center; font-size: 10px; font-weight: 700; color: #a0aec0; margin-top: 25px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- ================= LAYER 1: LOGIN SCREEN ================= -->
        <div id="loginPage" class="login-card">
            <div class="logo-box">🌴</div>
            <h1>MPI Pertanian Modern</h1>
            <p class="subtitle">Kalkulator Interaktif Komoditas Nasional</p>
            <div>
                <span class="school-badge">SMK N 1 GEDUNG AJI</span>
            </div>
            
            <div class="form-group">
                <label>Nama Lengkap Siswa:</label>
                <input type="text" id="studentName" class="form-input" placeholder="Ketik nama lengkap untuk absen...">
            </div>
            <div class="form-group">
                <label>Pilih Karakter Pengguna:</label>
                <select id="studentGender" class="form-input" style="appearance: none;">
                    <option value="🧑‍🌾">Siswa (Laki-laki) 🧑‍🌾</option>
                    <option value="👩‍🌾">Siswi (Perempuan) 👩‍🌾</option>
                </select>
            </div>
